<!DOCTYPE html>
<html lang="en">
<head>

<title>12-Week Execution Program</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;overflow:hidden;background:#12141A;font-family:'DM Sans','SF Pro Display',-apple-system,sans-serif}
input,textarea,button{font-family:inherit}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:0;background:transparent}
@keyframes spin{to{transform:rotate(360deg)}}
/* Install banner */
.install-banner{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:400px;background:linear-gradient(135deg,#FF6B35,#E84855);border-radius:16px;padding:16px 20px;z-index:150;display:flex;align-items:center;justify-content:space-between;box-shadow:0 8px 32px rgba(255,107,53,0.3);animation:slideUp 0.4s ease}
@keyframes slideUp{from{transform:translateX(-50%) translateY(100px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-type="module">
const {useState,useEffect,useRef} = React;

/* ═══ STORAGE ═══ */
const STORE_KEY = 'ep3_pwa';
const DEFAULTS = {prof:{name:"",weightKg:0,goal:"gain",mult:17,cal:0,prot:0,wLbs:0,startDate:"",notes:""},week:1,wLog:{},isM:true,setLogs:{},addedF:[],wInput:""};

function useStore(){
  const[data,setData]=useState(DEFAULTS);
  const[ready,setReady]=useState(false);
  const saveRef=useRef(null);
  useEffect(()=>{try{const s=localStorage.getItem(STORE_KEY);if(s)setData(d=>({...DEFAULTS,...JSON.parse(s)}))}catch{}setReady(true)},[]);
  useEffect(()=>{if(!ready)return;clearTimeout(saveRef.current);saveRef.current=setTimeout(()=>{try{localStorage.setItem(STORE_KEY,JSON.stringify(data))}catch{}},400)},[data,ready]);
  const update=(key,valOrFn)=>setData(prev=>{const nv=typeof valOrFn==="function"?valOrFn(prev[key]):valOrFn;return{...prev,[key]:nv}});
  return{data,update,ready};
}

/* ═══ ILLUSTRATIONS ═══ */

    <div style={{...S.card,marginTop:20,marginBottom:20}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><span style={{fontSize:12,fontWeight:700,color:"#8A8F98",textTransform:"uppercase"}}>Week</span><div style={{display:"flex",gap:6}}><button onClick={()=>update("week",w=>Math.max(1,w-1))} style={{width:32,height:32,borderRadius:8,background:"#12141A",border:"1px solid #2A2D35",color:"#8A8F98",cursor:"pointer",fontSize:16}}>‹</button><div style={{width:48,height:32,borderRadius:8,background:"#FF6B3518",border:"1px solid #FF6B3530",display:"flex",alignItems:"center",justifyContent:"center",color:"#FF6B35",fontSize:16,fontWeight:800}}>{week}</div><button onClick={()=>update("week",w=>Math.min(12,w+1))} style={{width:32,height:32,borderRadius:8,background:"#12141A",border:"1px solid #2A2D35",color:"#8A8F98",cursor:"pointer",fontSize:16}}>›</button></div></div><div style={{background:"#12141A",borderRadius:8,height:8,overflow:"hidden"}}><div style={{height:"100%",width:`${(week/12)*100}%`,background:"linear-gradient(90deg,#FF6B35,#4ECDC4)",borderRadius:8}}/></div></div>
    <div style={{marginBottom:20}}>{PHASES.map((p,i)=>{const a=(week<=2&&i===0)||(week>=3&&week<=6&&i===1)||(week>=7&&week<=10&&i===2)||(week>=11&&i===3);return(<div key={i} style={{display:"flex",gap:14,alignItems:"center",background:a?`${p.color}10`:"transparent",border:a?`1px solid ${p.color}30`:"1px solid transparent",borderRadius:14,padding:"14px 16px",marginBottom:8}}><div style={{width:40,height:40,borderRadius:12,background:a?p.color:"#1A1D23",border:a?"none":"1px solid #2A2D35",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:900,color:"#fff",flexShrink:0}}>{i+1}</div><div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:a?"#fff":"#6B7280"}}>{p.label} <span style={{fontSize:11,color:a?p.color:"#4A4D55",fontWeight:600}}>Wk {p.weeks}</span></div><div style={{fontSize:12,color:"#6B7280",marginTop:2}}>{p.desc}</div></div></div>)})}</div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:20}}>{Array.from({length:12},(_,i)=>{const w=i+1;const d=wLog[w]?Object.keys(wLog[w]).length:0;const c=w===week;const p=getPhase(w);return(<div key={w} style={{background:c?`${p.color}15`:"#1A1D23",border:c?`2px solid ${p.color}`:"1px solid #2A2D35",borderRadius:12,padding:"12px 8px",textAlign:"center"}}><div style={{fontSize:10,color:"#6B7280",fontWeight:600,marginBottom:4}}>WK{w}</div><div style={{display:"flex",gap:3,justifyContent:"center"}}>{[0,1,2,3].map(x=>(<div key={x} style={{width:8,height:8,borderRadius:4,background:x<d?p.color:"#2A2D35"}}/>))}</div></div>)})}</div>
    <div style={S.card}><div style={{fontSize:12,fontWeight:700,color:"#FF6B35",textTransform:"uppercase",marginBottom:10}}>Bench Example</div><div style={{fontSize:13,color:"#C0C4CC",lineHeight:1.8}}>{isM?<span>Wk3→100kg×8 · Wk6→100kg×10 · Wk7→105kg×6 · Wk11→73kg×12</span>:<span>Wk3→220lbs×8 · Wk6→220lbs×10 · Wk7→231lbs×6 · Wk11→161lbs×12</span>}</div></div>
  </div>);

  /* ─── GUIDE ─── */
  const renderGuide=()=>(<div style={{padding:"0 20px 100px"}}><div style={{padding:"32px 0 8px"}}><div style={{fontSize:13,fontWeight:600,letterSpacing:3,color:"#7B68EE",textTransform:"uppercase",marginBottom:8}}>Guide</div><h1 style={{fontSize:28,fontWeight:800,color:"#fff",margin:0}}>Program Guide</h1></div>
    <div style={{...S.card,marginTop:20,marginBottom:20}}><div style={{marginBottom:10}}><label style={{fontSize:11,color:"#6B7280",fontWeight:600}}>Name</label><input value={prof.name||""} onChange={e=>update("prof",p=>({...p,name:e.target.value}))} placeholder="Your name" style={{width:"100%",background:"#12141A",border:"1px solid #2A2D35",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:14,outline:"none",marginTop:4,fontFamily:"inherit",boxSizing:"border-box"}}/></div><div style={{marginBottom:10}}><label style={{fontSize:11,color:"#6B7280",fontWeight:600}}>Start</label><input type="date" value={prof.startDate||""} onChange={e=>update("prof",p=>({...p,startDate:e.target.value}))} style={{width:"100%",background:"#12141A",border:"1px solid #2A2D35",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:14,outline:"none",marginTop:4,fontFamily:"inherit",boxSizing:"border-box"}}/></div><div><label style={{fontSize:11,color:"#6B7280",fontWeight:600}}>Notes</label><textarea value={prof.notes||""} onChange={e=>update("prof",p=>({...p,notes:e.target.value}))} placeholder="Goals..." style={{width:"100%",background:"#12141A",border:"1px solid #2A2D35",borderRadius:10,padding:"10px 14px",color:"#fff",fontSize:13,outline:"none",marginTop:4,fontFamily:"inherit",minHeight:60,resize:"vertical",boxSizing:"border-box"}}/></div></div>
    <div style={{background:"linear-gradient(135deg,#FF6B3510,#E8485510)",border:"1px solid #FF6B3525",borderRadius:16,padding:"20px",marginBottom:20}}><div style={{fontSize:13,color:"#C0C4CC",lineHeight:1.8}}>12 weeks of average programming executed consistently beats perfect programming attempted inconsistently.</div><div style={{marginTop:14,padding:"12px 16px",background:"#12141A80",borderRadius:10,fontSize:13,fontWeight:700,color:"#E84855",textAlign:"center"}}>DON'T THINK. JUST EXECUTE.</div></div>
    <div style={{...S.card,marginBottom:20}}>{[["📅","4 days/week"],["📋","Exact exercises"],["🥗","Nutrition formula"],["💀","Every set→FAILURE"],["🔒","Nothing changes"]].map(([e,r],i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<4?"1px solid #1E2028":"none"}}><span style={{fontSize:20}}>{e}</span><span style={{fontSize:14,color:"#E0E0E0",fontWeight:600}}>{r}</span></div>))}</div>
    {FAQS.map((f,i)=>(<div key={i} style={{background:"#1A1D23",borderRadius:14,border:openFaq===i?"1px solid #7B68EE30":"1px solid #2A2D35",marginBottom:8,overflow:"hidden"}}><button onClick={()=>setOpenFaq(openFaq===i?null:i)} style={{width:"100%",background:"none",border:"none",cursor:"pointer",padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:14,fontWeight:700,color:"#fff",textAlign:"left"}}>{f.q}</span><span style={{color:"#4A4D55",flexShrink:0}}>{openFaq===i?<Ic.Up/>:<Ic.Dn/>}</span></button>{openFaq===i&&<div style={{padding:"0 16px 14px",fontSize:13,color:"#8A8F98",lineHeight:1.7}}>{f.a}</div>}</div>))}
  </div>);

  /* ─── RENDER ─── */
  const navItems=[{id:"home",l:"Home",I:Ic.Home},{id:"workout",l:"Workout",I:Ic.Dum},{id:"nutrition",l:"Food",I:Ic.App},{id:"progress",l:"Progress",I:Ic.Bar},{id:"guide",l:"Guide",I:Ic.Inf}];
  return(<div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#12141A",position:"relative"}}>
    <div style={{overflowY:"auto",height:"100vh",paddingBottom:80}}>
      {tab==="home"&&renderHome()}
      {tab==="workout"&&(aWo&&wo?renderWoDetail():renderWoList())}
      {tab==="nutrition"&&renderNutr()}
      {tab==="progress"&&renderProg()}
      {tab==="guide"&&renderGuide()}
    </div>
    {showInstall&&<div className="install-banner"><div><div style={{fontSize:14,fontWeight:800,color:"#fff"}}>Install this app</div><div style={{fontSize:12,color:"#ffffffAA",marginTop:2}}>Add to home screen for full experience</div></div><div style={{display:"flex",gap:8}}><button onClick={doInstall} style={{background:"#fff",border:"none",borderRadius:10,padding:"8px 16px",fontSize:13,fontWeight:700,color:"#FF6B35",cursor:"pointer"}}>Install</button><button onClick={()=>setShowInstall(false)} style={{background:"none",border:"1px solid #ffffff40",borderRadius:10,padding:"8px 12px",color:"#fff",cursor:"pointer",fontSize:13}}>Later</button></div></div>}
    <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"linear-gradient(180deg,#12141AE0,#12141A)",backdropFilter:"blur(20px)",borderTop:"1px solid #1E2028",padding:"8px 8px calc(8px + env(safe-area-inset-bottom,0px))",display:"flex",justifyContent:"space-around",zIndex:100}}>
      {navItems.map(({id,l,I})=>{const a=tab===id;return(<button key={id} onClick={()=>{setTab(id);if(id!=="workout")setAWo(null)}} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"6px 12px",borderRadius:12,minWidth:50,color:a?"#FF6B35":"#4A4D55"}}><I/><span style={{fontSize:10,fontWeight:700}}>{l}</span>{a&&<div style={{width:4,height:4,borderRadius:2,background:"#FF6B35",marginTop:-1}}/>}</button>)})}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
</body>
</html>
