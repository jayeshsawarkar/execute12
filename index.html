    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }
    input[type="number"]::-webkit-inner-spin-button,

    input[type="number"] { -moz-appearance: textfield; }

      background:linear-gradient(135deg,#FF6B35,#E85D2A); border:none; border-radius:14px; padding:12px 24px;
      color:#fff; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer;
      box-shadow:0 4px 20px rgba(255,107,53,0.4); max-width:360px; width:calc(100% - 40px); text-align:center; }

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <button id="pwa-install" onclick="installPWA()">Install App to Home Screen</button>
  <script>
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; document.getElementById('pwa-install').style.display = 'block'; });
    function installPWA() { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(() => { document.getElementById('pwa-install').style.display = 'none'; deferredPrompt = null; }); } }
    window.addEventListener('appinstalled', () => { document.getElementById('pwa-install').style.display = 'none'; });
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(e => console.log('SW:', e)); }
  </script>

   PERSISTENCE HOOK — uses window.storage API
   FIX #1: Replaced localStorage (which crashes artifacts)
   ═══════════════════════════════════════════════ */
const STORE_KEY = "ep3_data";
const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const WO_ORDER = ["upperA","lowerA","upperB","lowerB"];
const DEFAULT_SCHED = {0:"upperA",1:"lowerA",3:"upperB",4:"lowerB"};

function usePersistedState() {
  const [data, setData] = useState(() => {
    try {
      const saved = localStorage.getItem(STORE_KEY);
      if (saved) { return { ...DEFAULTS, ...JSON.parse(saved) }; }
    } catch (e) {}
    return DEFAULTS;
  });
  const [ready] = useState(true);
  const saveRef = useRef(null);

  useEffect(() => {
    clearTimeout(saveRef.current);
    saveRef.current = setTimeout(() => {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch (e) {}
    }, 300);
  }, [data]);

  const update = (key, valOrFn) => {
    setData(prev => {
      const newVal = typeof valOrFn === "function" ? valOrFn(prev[key]) : valOrFn;
      return { ...prev, [key]: newVal };
    });
  };

  return { data, update, ready };
}

      </div>
      <div style={{marginBottom:24}}><div style={{fontSize:13,fontWeight:700,color:"#8A8F98",letterSpacing:1.5,textTransform:"uppercase",marginBottom:12}}>12-Week Timeline</div>
        <div style={{display:"flex",gap:4}}>{Array.from({length:12},(_,i)=>{const w=i+1;const d=wLog[w]?Object.keys(wLog[w]).length:0;const cur=w===week;const p=getPhase(w);return(<div key={w} style={{flex:1}}><div style={{height:40,borderRadius:6,background:cur?p.color:d>0?`${p.color}60`:"#1A1D23",border:cur?`2px solid ${p.color}`:"1px solid #2A2D35",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,color:cur||d>0?"#fff":"#4A4D55"}}>{d>0?`${d}/4`:w}</div></div>)})}</div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><button onClick={()=>setTab("nutrition")} style={{background:"linear-gradient(135deg,#FF6B3515,#FF6B3508)",border:"1px solid #FF6B3530",borderRadius:14,padding:"14px",cursor:"pointer",textAlign:"left"}}><div style={{fontSize:12,fontWeight:700,color:"#FF6B35"}}>⚡ Nutrition & Meals</div></button><button onClick={()=>setTab("guide")} style={{background:"linear-gradient(135deg,#7B68EE15,#7B68EE08)",border:"1px solid #7B68EE30",borderRadius:14,padding:"14px",cursor:"pointer",textAlign:"left"}}><div style={{fontSize:12,fontWeight:700,color:"#7B68EE"}}>📖 Program Guide</div></button></div>
    </div>
  );

  /* ═════════════════════ WORKOUT LIST ═════════════════════ */
  const renderWorkoutList = () => {
    const assignedDays = Object.keys(sched||{}).map(Number);
    const assignedWorkouts = Object.values(sched||{});
    const unassignedWo = WO_ORDER.filter(w => !assignedWorkouts.includes(w));

    const handleDayTap = (dayIdx) => {
      const cur = {...(sched||{})};
      if (cur[dayIdx]) {
        // Remove this day
        delete cur[dayIdx];
      } else {
        // Assign next unassigned workout
        const assigned = Object.values(cur);
        const next = WO_ORDER.find(w => !assigned.includes(w));
        if (next && Object.keys(cur).length < 4) {
          cur[dayIdx] = next;
        }
      }
      update("sched", cur);
    };

    const resetSched = () => { update("sched", {...DEFAULT_SCHED}); setEditingSched(false); };

    return (
    <div style={{padding:"0 20px 100px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}><SectionTitle color="#FF6B35" pre="Part 2" title="Workouts"/><div style={{marginTop:36}}><UnitBtn isM={isM} toggle={toggleUnit}/></div></div>

      {/* Schedule Editor Toggle */}
      <div style={{...S.card,marginTop:20,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:editingSched?14:0}}>
          <div style={{fontSize:12,fontWeight:700,color:"#8A8F98",letterSpacing:1.5,textTransform:"uppercase"}}>Your Schedule</div>
          <button onClick={()=>setEditingSched(!editingSched)} style={{background:editingSched?"#FF6B3520":"#12141A",border:editingSched?"1px solid #FF6B35":"1px solid #2A2D35",borderRadius:10,padding:"6px 14px",cursor:"pointer",fontSize:11,fontWeight:700,color:editingSched?"#FF6B35":"#8A8F98"}}>
            {editingSched ? "Done" : "✏️ Customize Days"}
          </button>
        </div>

        {editingSched && (
          <div style={{marginBottom:14}}>
            <div style={{fontSize:12,color:"#6B7280",marginBottom:12,lineHeight:1.5}}>Tap 4 days for your workouts. Workouts auto-assign in order: Upper A → Lower A → Upper B → Lower B. Remaining days become rest days.</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6,marginBottom:12}}>
              {DAYS.map((d,i) => {
                const woKey = (sched||{})[i];
                const wo = woKey ? WD[woKey] : null;
                const isActive = !!wo;
                return (
                  <button key={i} onClick={()=>handleDayTap(i)} style={{
                    background: isActive ? `${wo.color}20` : "#12141A",
                    border: isActive ? `2px solid ${wo.color}` : "1px solid #2A2D35",
                    borderRadius: 12, padding: "10px 4px", cursor: "pointer", textAlign: "center",
                    transition: "all 0.2s"
                  }}>
                    <div style={{fontSize:11,fontWeight:700,color:isActive?"#fff":"#4A4D55"}}>{d}</div>
                    {isActive && <div style={{fontSize:8,fontWeight:700,color:wo.color,marginTop:3,lineHeight:1.1}}>{wo.title.replace("Body ","")}</div>}
                    {!isActive && <div style={{fontSize:8,color:"#3A3D45",marginTop:3}}>Rest</div>}
                  </button>
                );
              })}
            </div>
            {Object.keys(sched||{}).length < 4 && (
              <div style={{fontSize:11,color:"#E84855",fontWeight:600,marginBottom:8}}>⚠️ Pick {4 - Object.keys(sched||{}).length} more day{4 - Object.keys(sched||{}).length > 1 ? "s" : ""} — you need exactly 4 workout days</div>
            )}
            <button onClick={resetSched} style={{background:"none",border:"1px solid #2A2D35",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:11,color:"#6B7280",fontWeight:600}}>↩ Reset to Default (Mon/Tue/Thu/Fri)</button>
          </div>
        )}
      </div>

      {/* Weekly View */}
      <div style={{...S.card,marginBottom:20}}>
        <div style={{fontSize:12,fontWeight:700,color:"#8A8F98",letterSpacing:1.5,textTransform:"uppercase",marginBottom:14}}>Weekly Schedule</div>
        {DAYS.map((d,i) => {
          const woKey = (sched||{})[i];
          const w = woKey ? WD[woKey] : null;
          return (
            <div key={d} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<6?"1px solid #1E2028":"none"}}>
              <div style={{width:36,fontSize:12,fontWeight:700,color:w?"#8A8F98":"#3A3D45"}}>{d}</div>
              {w ? (
                <button onClick={()=>{setAWo(woKey);setExpEx(null)}} style={{flex:1,display:"flex",alignItems:"center",gap:10,background:"none",border:"none",cursor:"pointer",padding:0}}>
                  <div style={{width:36,height:36,borderRadius:10,background:`${w.color}18`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>{w.icon}</div>
                  <div style={{textAlign:"left"}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{w.title}</div>
                    <div style={{fontSize:11,color:"#6B7280"}}>{w.subtitle} · 45-60 min</div>
                  </div>
                  {wLog[week]?.[woKey] && <div style={{marginLeft:"auto",width:20,height:20,borderRadius:10,background:w.color,display:"flex",alignItems:"center",justifyContent:"center"}}><Ic.Chk/></div>}
                </button>
              ) : (
                <div style={{flex:1,fontSize:13,color:"#3A3D45",fontWeight:600}}>Rest Day 🛋️</div>
              )}
            </div>
          );
        })}
      </div>
      <div style={{background:"linear-gradient(135deg,#E8485512,#E8485508)",border:"1px solid #E8485530",borderRadius:16,padding:"18px 20px"}}><div style={{fontSize:14,fontWeight:800,color:"#E84855",marginBottom:8}}>⚠️ NON-NEGOTIABLE</div><div style={{fontSize:13,color:"#C0C4CC",lineHeight:1.7}}>EVERY SET → <strong style={{color:"#fff"}}>FAILURE</strong>. You physically cannot do another rep.</div></div>
    </div>
    );
  };

  /* ═════════════════════ WORKOUT DETAIL ═════════════════════ */
  const renderWorkoutDetail = () => {
    const exDone = wo.exercises.filter(ex => { const k=`${week}-${aWo}-${ex.id}`; const l=setLogs[k]; return l && Object.keys(l).length >= ex.sets; }).length;
    const allDone = exDone === wo.exercises.length;
    const isDone = wLog[week]?.[aWo];
    return (
    <div style={{padding:"0 20px 100px"}}>
      <div style={{padding:"24px 0 4px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={()=>setAWo(null)} style={{background:"#1A1D23",border:"1px solid #2A2D35",borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#8A8F98",fontSize:16}}>←</button>
        <div style={{flex:1}}><div style={{fontSize:11,fontWeight:700,letterSpacing:2,color:wo.color,textTransform:"uppercase"}}>{dayForWo(aWo)}</div><h2 style={{fontSize:22,fontWeight:800,color:"#fff",margin:"2px 0 0"}}>{wo.title}</h2></div>
        <UnitBtn isM={isM} toggle={toggleUnit}/>
      </div>
      <div style={{fontSize:12,color:"#6B7280",marginBottom:16,paddingLeft:48}}>{wo.subtitle} · {exDone}/{wo.exercises.length} · Wk {week} · {isM?"kg":"lbs"}</div>
      {restL>0&&(<div style={{background:"linear-gradient(135deg,#FF6B3520,#FF6B3510)",border:"1px solid #FF6B3540",borderRadius:14,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}><span style={{fontSize:13,fontWeight:700,color:"#FF6B35"}}>⏱️ Rest</span><span style={{fontSize:22,fontWeight:900,color:"#fff",fontFamily:"monospace"}}>{Math.floor(restL/60)}:{(restL%60).toString().padStart(2,"0")}</span><button onClick={()=>setRestL(0)} style={{background:"#FF6B3530",border:"none",borderRadius:8,padding:"6px 12px",color:"#FF6B35",fontWeight:700,fontSize:11,cursor:"pointer"}}>Skip</button></div>)}

      {showEx&&(<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#000000DD",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={()=>setShowEx(null)}><div style={{background:"#1A1D23",borderRadius:20,padding:"24px",maxWidth:380,width:"100%",border:`1px solid ${wo.color}30`}} onClick={e=>e.stopPropagation()}><div style={{width:"100%",height:160,marginBottom:16}}>{ExIllust[showEx.name]?ExIllust[showEx.name](wo.color):<div style={{textAlign:"center",paddingTop:60,color:"#6B7280"}}>Illustration</div>}</div><h3 style={{fontSize:18,fontWeight:800,color:"#fff",margin:"0 0 6px"}}>{showEx.name}</h3><div style={{fontSize:12,color:wo.color,fontWeight:700,marginBottom:10}}>{showEx.muscles}</div><div style={{fontSize:13,color:"#C0C4CC",lineHeight:1.7,marginBottom:14}}><strong style={{color:"#FF6B35"}}>Form Tips: </strong>{showEx.tips}</div><div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}><div style={{background:"#12141A",borderRadius:8,padding:"6px 12px",fontSize:11,color:"#8A8F98"}}>🔄 {showEx.sets}s × {showEx.reps}</div><div style={{background:"#12141A",borderRadius:8,padding:"6px 12px",fontSize:11,color:"#8A8F98"}}>⏱️ {showEx.rest}</div></div><button onClick={()=>setShowEx(null)} style={{width:"100%",background:wo.color,border:"none",borderRadius:12,padding:"12px",cursor:"pointer",fontSize:14,fontWeight:700,color:"#fff"}}>Got It</button></div></div>)}

      {wo.exercises.map((ex,idx)=>{
        const lk=`${week}-${aWo}-${ex.id}`;const ml=setLogs[lk]||{};const isExp=expEx===ex.id;const done=Object.keys(ml).length>=ex.sets;
        return(<div key={ex.id} style={{background:done?`${wo.color}08`:"#1A1D23",border:done?`1px solid ${wo.color}25`:"1px solid #2A2D35",borderRadius:16,marginBottom:10,overflow:"hidden"}}>
          <div style={{display:"flex",alignItems:"center"}}><button onClick={()=>setExpEx(isExp?null:ex.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}><div style={{width:30,height:30,borderRadius:10,background:done?wo.color:"#12141A",border:done?"none":"1px solid #2A2D35",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:done?"#fff":"#6B7280",flexShrink:0}}>{done?<Ic.Chk/>:idx+1}</div><div style={{flex:1,textAlign:"left"}}><div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{ex.name}</div><div style={{fontSize:11,color:"#6B7280",marginTop:2}}>{ex.sets}s × {ex.reps} · {ex.muscles}</div></div><div style={{color:"#4A4D55"}}>{isExp?<Ic.Up/>:<Ic.Dn/>}</div></button><button onClick={()=>setShowEx(ex)} style={{background:wo.color+"18",border:"none",borderRadius:10,width:34,height:34,marginRight:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:wo.color}}><Ic.Eye/></button></div>
          {isExp&&(<div style={{padding:"0 16px 16px"}}>
            <div style={{width:"100%",height:90,marginBottom:10,background:"#12141A",borderRadius:12,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center"}}>{ExIllust[ex.name]?ExIllust[ex.name](wo.color):<span style={{color:"#6B7280",fontSize:12}}>Exercise</span>}</div>
            <div style={{fontSize:12,color:"#C0C4CC",marginBottom:10,padding:"10px 14px",background:"#12141A",borderRadius:10,lineHeight:1.6}}><span style={{color:"#FF6B35",fontWeight:700}}>💡 </span>{ex.tips}</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>{[{l:`${ex.sets} sets`,I:<Ic.Tgt/>},{l:ex.reps,I:<Ic.Fire/>},{l:ex.rest,I:<Ic.Clk/>}].map((c,i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:4,background:"#12141A",border:"1px solid #2A2D35",borderRadius:8,padding:"5px 10px",fontSize:11,color:"#8A8F98",fontWeight:600}}>{c.I} {c.l}</div>))}</div>
            <div style={{fontSize:10,color:"#E84855",fontWeight:700,marginBottom:8}}>⚠️ EVERY SET → FAILURE</div>
            <div style={{display:"flex",gap:4,marginBottom:5}}><div style={{width:28}}/><div style={{flex:1,fontSize:10,color:"#6B7280",fontWeight:700,textAlign:"center"}}>{isM?"KG":"LBS"}</div><div style={{flex:1,fontSize:10,color:"#6B7280",fontWeight:700,textAlign:"center"}}>REPS</div><div style={{width:32}}/></div>
            {Array.from({length:ex.sets},(_,si)=>{
              const sn=si+1;const lg=ml[sn];
              return(<div key={si} style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}>
                <div style={{width:28,height:28,borderRadius:8,fontSize:11,fontWeight:800,background:lg?wo.color:"#12141A",border:lg?"none":"1px solid #2A2D35",color:lg?"#fff":"#4A4D55",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{sn}</div>
                <input type="number" min="0" placeholder={isM?"kg":"lbs"} value={lg?.weight||""} onChange={e=>{const v=Math.max(0,e.target.value);update("setLogs",p=>({...p,[lk]:{...p[lk],[sn]:{...(p[lk]?.[sn]||{}),weight:v,unit:isM?"kg":"lbs"}}}))}} style={{flex:1,background:"#12141A",border:"1px solid #2A2D35",borderRadius:8,padding:"8px 10px",color:"#fff",fontSize:14,fontWeight:600,outline:"none",fontFamily:"inherit",minWidth:0}}/>
                <input type="number" min="0" placeholder="reps" value={lg?.reps||""} onChange={e=>{const v=Math.max(0,e.target.value);update("setLogs",p=>({...p,[lk]:{...p[lk],[sn]:{...(p[lk]?.[sn]||{}),reps:v}}}))}} style={{flex:1,background:"#12141A",border:"1px solid #2A2D35",borderRadius:8,padding:"8px 10px",color:"#fff",fontSize:14,fontWeight:600,outline:"none",fontFamily:"inherit",minWidth:0}}/>
                <button onClick={()=>setRestL(restSec(ex.rest))} style={{background:"#FF6B3518",border:"1px solid #FF6B3530",borderRadius:8,padding:"8px",cursor:"pointer",color:"#FF6B35",flexShrink:0,display:"flex",alignItems:"center"}}><Ic.Clk/></button>
              </div>)
            })}
          </div>)}
        </div>)})}

      {/* FIX #5: Undo workout completion + clearer button states */}
      {isDone ? (
        <div style={{textAlign:"center",padding:"16px"}}>
          <div style={{color:wo.color,fontSize:15,fontWeight:800,marginBottom:8}}>✅ Completed Week {week}!</div>
          <button onClick={()=>update("wLog",p=>{const n={...p};if(n[week]){const w={...n[week]};delete w[aWo];n[week]=w;}return n;})} style={{background:"none",border:"1px solid #2A2D35",borderRadius:10,padding:"8px 16px",cursor:"pointer",color:"#6B7280",fontSize:12,fontWeight:600,display:"inline-flex",alignItems:"center",gap:5}}><Ic.Undo/> Undo</button>
        </div>
      ) : (
        <button onClick={()=>allDone&&update("wLog",p=>({...p,[week]:{...(p[week]||{}),[aWo]:true}}))} style={{width:"100%",background:allDone?`linear-gradient(135deg,${wo.color},${wo.color}CC)`:"#2A2D35",border:"none",borderRadius:14,padding:"16px",cursor:allDone?"pointer":"default",fontSize:14,fontWeight:800,color:"#fff",marginTop:12,opacity:allDone?1:0.5}}>
          {allDone ? "✅ Complete Workout" : `Log all ${wo.exercises.length} exercises to complete (${exDone} done)`}
        </button>
      )}
    </div>
  )};

  /* ═════════════════════ NUTRITION ═════════════════════ */
  const renderNutrition = () => (
    <div style={{padding:"0 20px 100px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}><SectionTitle color="#FF6B35" pre="Nutrition" title="Fuel Your Gains"/><div style={{marginTop:36}}><UnitBtn isM={isM} toggle={toggleUnit}/></div></div>

      <div style={{...S.card,marginTop:20,marginBottom:16}}><label style={{fontSize:12,fontWeight:700,color:"#8A8F98",letterSpacing:1,textTransform:"uppercase"}}>Weight ({isM?"kg":"lbs"})</label>
        <div style={{display:"flex",alignItems:"center",gap:12,marginTop:10}}>
          <input type="number" min="0" value={wInput} onChange={e=>update("wInput",String(Math.max(0,e.target.value)))} placeholder={isM?"80":"176"} style={{flex:1,background:"#12141A",border:"1px solid #2A2D35",borderRadius:12,padding:"14px 16px",color:"#fff",fontSize:20,fontWeight:700,outline:"none",fontFamily:"inherit"}}/>
          <div style={{color:"#6B7280",fontSize:14}}>{isM?"kg":"lbs"}</div>
          {wInput&&<div style={{background:"#4ECDC415",color:"#4ECDC4",padding:"8px 14px",borderRadius:10,fontSize:13,fontWeight:700}}>= {isM?`${Math.round(weightLbs)} lbs`:`${Math.round(weightKg*10)/10} kg`}</div>}
        </div>
      </div>

      <div style={{...S.card,marginBottom:16}}><label style={{fontSize:12,fontWeight:700,color:"#8A8F98",letterSpacing:1,textTransform:"uppercase"}}>Goal</label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:10}}>
          {[["lose","Lose","🔻"],["maintain","Maintain","⚖️"],["gain","Gain","💪"]].map(([k,l,e])=>(<button key={k} onClick={()=>update("prof",p=>({...p,goal:k,mult:gm[k][1]}))} style={{background:prof.goal===k?"#FF6B3518":"#12141A",border:prof.goal===k?"2px solid #FF6B35":"1px solid #2A2D35",borderRadius:12,padding:"14px 8px",cursor:"pointer",textAlign:"center"}}><div style={{fontSize:22}}>{e}</div><div style={{fontSize:12,fontWeight:700,color:prof.goal===k?"#FF6B35":"#8A8F98",marginTop:4}}>{l}</div></button>))}
        </div>
      </div>

      <div style={{...S.card,marginBottom:16}}><label style={{fontSize:12,fontWeight:700,color:"#8A8F98",letterSpacing:1,textTransform:"uppercase"}}>Multiplier</label>
        <div style={{display:"flex",gap:8,marginTop:10}}>{gm[prof.goal].map(m=>(<button key={m} onClick={()=>update("prof",p=>({...p,mult:m}))} style={{flex:1,background:prof.mult===m?"#FF6B35":"#12141A",border:prof.mult===m?"none":"1px solid #2A2D35",borderRadius:12,padding:"14px",cursor:"pointer",fontSize:18,fontWeight:800,color:prof.mult===m?"#fff":"#6B7280"}}>×{m}</button>))}</div>
      </div>

      {wInputNum>0&&(<div style={{background:"linear-gradient(135deg,#FF6B3512,#4ECDC410)",border:"1px solid #FF6B3525",borderRadius:20,padding:"24px",marginBottom:20}}>
        <div style={{fontSize:12,fontWeight:700,letterSpacing:2,color:"#FF6B35",textTransform:"uppercase",marginBottom:16}}>Daily Targets</div>
        <div style={{display:"flex",gap:20,justifyContent:"center",marginBottom:16}}><div style={{textAlign:"center"}}><div style={{fontSize:38,fontWeight:900,color:"#FF6B35",lineHeight:1}}>{calories}</div><div style={{fontSize:12,color:"#8A8F98",fontWeight:600,marginTop:4}}>Calories</div></div><div style={{width:1,background:"#2A2D3580"}}/><div style={{textAlign:"center"}}><div style={{fontSize:38,fontWeight:900,color:"#4ECDC4",lineHeight:1}}>{proteinG}g</div><div style={{fontSize:12,color:"#8A8F98",fontWeight:600,marginTop:4}}>Protein</div></div></div>
        <div style={{background:"#12141A80",borderRadius:12,padding:"12px 16px",fontSize:12,color:"#8A8F98",lineHeight:1.6}}><strong style={{color:"#fff"}}>Formula:</strong> {isM?`${wInput}kg × 2.2 = ${Math.round(weightLbs)}lbs`:`${wInput}lbs`} × {prof.mult} = {calories} cal | <strong style={{color:"#fff"}}>Protein:</strong> {Math.round(weightLbs)} × 1 = {proteinG}g</div>
      </div>)}

      <div style={{fontSize:13,fontWeight:700,color:"#8A8F98",letterSpacing:1.5,textTransform:"uppercase",marginBottom:12}}>Meal Ideas</div>
      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto"}}>{["breakfast","lunch","dinner","snack"].map(t=>(<button key={t} onClick={()=>setMTab(t)} style={{padding:"8px 16px",borderRadius:10,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",background:mTab===t?"#FF6B3520":"#1A1D23",border:mTab===t?"1px solid #FF6B35":"1px solid #2A2D35",color:mTab===t?"#FF6B35":"#6B7280",textTransform:"capitalize"}}>{t}</button>))}</div>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>{MEALS[mTab].map((m,mi)=>{const t=mealTotals(m.items);return(<div key={mi} style={{...S.card,padding:"16px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:22}}>{m.emoji}</span><span style={{fontSize:15,fontWeight:700,color:"#fff"}}>{m.name}</span></div><div style={{fontSize:12,fontWeight:700,color:"#FF6B35"}}>{t.cal} cal</div></div><div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>{m.items.map((n,ii)=>{const f=FOODS.find(x=>x.name===n);return f?(<div key={ii} style={{background:"#12141A",borderRadius:8,padding:"5px 10px",fontSize:11,color:"#8A8F98"}}>{f.emoji} {f.name} <span style={{color:"#4ECDC4"}}>({f.protein}g P)</span></div>):null})}</div><div style={{display:"flex",gap:12,fontSize:11,color:"#6B7280"}}><span>🔥 {t.cal}</span><span style={{color:"#4ECDC4"}}>💪 {t.protein}g P</span><span>🍞 {t.carbs}g C</span><span>🧈 {Math.round(t.fat)}g F</span></div></div>)})}</div>

      {/* Food Logger */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{fontSize:13,fontWeight:700,color:"#8A8F98",letterSpacing:1.5,textTransform:"uppercase"}}>Today's Log</div><button onClick={()=>setShowDb(!showDb)} style={{background:"#FF6B3520",border:"1px solid #FF6B3540",borderRadius:10,padding:"6px 14px",cursor:"pointer",fontSize:11,fontWeight:700,color:"#FF6B35"}}>{showDb?"Close":"+ Add Food"}</button></div>
      {showDb&&(<div style={{...S.card,padding:"16px",marginBottom:14}}>
        <div style={{display:"flex",gap:6,marginBottom:10,overflowX:"auto"}}>{[{k:"all",l:"All"},{k:"protein",l:"🥩 Protein"},{k:"carb",l:"🍚 Carbs"},{k:"fat",l:"🥑 Fats"},{k:"veggie",l:"🥦 Veggies"}].map(f=>(<button key={f.k} onClick={()=>setFFilt(f.k)} style={{padding:"5px 12px",borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",background:fFilt===f.k?"#4ECDC420":"#12141A",border:fFilt===f.k?"1px solid #4ECDC4":"1px solid #2A2D35",color:fFilt===f.k?"#4ECDC4":"#6B7280"}}>{f.l}</button>))}</div>
        {FOODS.filter(f=>fFilt==="all"||f.cat===fFilt).map((f,fi)=>(<button key={fi} onClick={()=>update("addedF",p=>[...p,{...f,qty:1}])} style={{width:"100%",display:"flex",alignItems:"center",gap:10,background:"none",border:"none",borderBottom:"1px solid #1E2028",padding:"10px 0",cursor:"pointer",textAlign:"left"}}><span style={{fontSize:20}}>{f.emoji}</span><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:"#fff"}}>{f.name}</div><div style={{fontSize:11,color:"#6B7280"}}>{f.serving} · {f.cal} cal · {f.protein}g P</div></div><div style={{color:"#4ECDC4",fontSize:18,fontWeight:700}}>+</div></button>))}
      </div>)}
      {addedF.length>0&&(<div style={{...S.card,padding:"16px",marginBottom:14}}>
        {addedF.map((f,fi)=>(<div key={fi} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:fi<addedF.length-1?"1px solid #1E2028":"none"}}>
          <span style={{fontSize:18}}>{f.emoji}</span>
          <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:"#fff"}}>{f.name}</div><div style={{fontSize:11,color:"#6B7280"}}>{f.cal*f.qty} cal · {f.protein*f.qty}g P</div></div>
          {/* FIX #9: quantity adjuster */}
          <div style={{display:"flex",alignItems:"center",gap:4}}>
            <button onClick={()=>update("addedF",p=>p.map((x,i)=>i===fi?{...x,qty:Math.max(1,x.qty-1)}:x))} style={{width:24,height:24,borderRadius:6,background:"#12141A",border:"1px solid #2A2D35",color:"#8A8F98",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
            <span style={{fontSize:13,fontWeight:700,color:"#fff",minWidth:18,textAlign:"center"}}>{f.qty}</span>
            <button onClick={()=>update("addedF",p=>p.map((x,i)=>i===fi?{...x,qty:x.qty+1}:x))} style={{width:24,height:24,borderRadius:6,background:"#12141A",border:"1px solid #2A2D35",color:"#8A8F98",cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
          </div>
          <button onClick={()=>update("addedF",p=>p.filter((_,i)=>i!==fi))} style={{background:"#E8485520",border:"none",borderRadius:8,width:28,height:28,cursor:"pointer",color:"#E84855",fontSize:14,fontWeight:700}}>×</button>
        </div>))}
        <div style={{marginTop:12,padding:"12px 16px",background:"linear-gradient(135deg,#FF6B3510,#4ECDC408)",borderRadius:10,border:"1px solid #FF6B3520"}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,fontWeight:700,marginBottom:6}}><span style={{color:"#8A8F98"}}>Logged</span><span style={{color:calories>0&&addT.cal>=calories?"#4ECDC4":"#FF6B35"}}>{Math.round(addT.cal)} / {calories||"—"} cal</span></div>
          {calories>0&&<div style={{background:"#12141A",borderRadius:6,height:8,overflow:"hidden",marginBottom:8}}><div style={{height:"100%",width:`${Math.min(100,addT.cal/calories*100)}%`,background:"linear-gradient(90deg,#FF6B35,#4ECDC4)",borderRadius:6,transition:"width 0.3s"}}/></div>}
          <div style={{display:"flex",justifyContent:"space-around",fontSize:11}}><span style={{color:"#4ECDC4"}}>💪 {Math.round(addT.protein)}/{proteinG||"—"}g P</span><span style={{color:"#6B7280"}}>🍞 {Math.round(addT.carbs)}g C</span><span style={{color:"#6B7280"}}>🧈 {Math.round(addT.fat)}g F</span></div>
        </div>
        <button onClick={()=>update("addedF",[])} style={{marginTop:10,width:"100%",background:"#1E2028",border:"1px solid #2A2D35",borderRadius:10,padding:"10px",cursor:"pointer",color:"#6B7280",fontSize:12,fontWeight:600}}>Clear Today's Log</button>
      </div>)}
    </div>
  );

  /* ═════════════════════ PROGRESS ═════════════════════ */
  const renderProgress = () => (
    <div style={{padding:"0 20px 100px"}}>
      <SectionTitle color="#4ECDC4" pre="Track" title="Progress"/>
      <div style={{...S.card,marginTop:20,marginBottom:20}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div style={{fontSize:12,fontWeight:700,color:"#8A8F98",letterSpacing:1.5,textTransform:"uppercase"}}>Current Week</div><div style={{display:"flex",gap:6}}><button onClick={()=>update("week",w=>Math.max(1,w-1))} style={{width:32,height:32,borderRadius:8,background:"#12141A",border:"1px solid #2A2D35",color:"#8A8F98",cursor:"pointer",fontSize:16}}>‹</button><div style={{width:48,height:32,borderRadius:8,background:"#FF6B3518",border:"1px solid #FF6B3530",display:"flex",alignItems:"center",justifyContent:"center",color:"#FF6B35",fontSize:16,fontWeight:800}}>{week}</div><button onClick={()=>update("week",w=>Math.min(12,w+1))} style={{width:32,height:32,borderRadius:8,background:"#12141A",border:"1px solid #2A2D35",color:"#8A8F98",cursor:"pointer",fontSize:16}}>›</button></div></div>
        <div style={{background:"#12141A",borderRadius:8,height:8,overflow:"hidden"}}><div style={{height:"100%",width:`${(week/12)*100}%`,background:"linear-gradient(90deg,#FF6B35,#4ECDC4)",borderRadius:8,transition:"width 0.3s"}}/></div>
      </div>
      <div style={{marginBottom:20}}><div style={{fontSize:12,fontWeight:700,color:"#8A8F98",letterSpacing:1.5,textTransform:"uppercase",marginBottom:12}}>Phases</div>
        {PHASES.map((p,i)=>{const a=(week<=2&&i===0)||(week>=3&&week<=6&&i===1)||(week>=7&&week<=10&&i===2)||(week>=11&&i===3);return(<div key={i} style={{display:"flex",gap:14,alignItems:"center",background:a?`${p.color}10`:"transparent",border:a?`1px solid ${p.color}30`:"1px solid transparent",borderRadius:14,padding:"14px 16px",marginBottom:8}}><div style={{width:40,height:40,borderRadius:12,background:a?p.color:"#1A1D23",border:a?"none":"1px solid #2A2D35",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:900,color:"#fff",flexShrink:0}}>{i+1}</div><div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between"}}><div style={{fontSize:15,fontWeight:700,color:a?"#fff":"#6B7280"}}>{p.label}</div><div style={{fontSize:11,color:a?p.color:"#4A4D55",fontWeight:600}}>Wk {p.weeks}</div></div><div style={{fontSize:12,color:"#6B7280",marginTop:2}}>{p.desc}</div></div></div>)})}
      </div>
      <div style={{fontSize:12,fontWeight:700,color:"#8A8F98",letterSpacing:1.5,textTransform:"uppercase",marginBottom:12}}>Completion</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:20}}>{Array.from({length:12},(_,i)=>{const w=i+1;const d=wLog[w]?Object.keys(wLog[w]).length:0;const c=w===week;const p=getPhase(w);return(<div key={w} style={{background:c?`${p.color}15`:"#1A1D23",border:c?`2px solid ${p.color}`:"1px solid #2A2D35",borderRadius:12,padding:"12px 8px",textAlign:"center"}}><div style={{fontSize:10,color:"#6B7280",fontWeight:600,marginBottom:4}}>WK {w}</div><div style={{display:"flex",gap:3,justifyContent:"center"}}>{[0,1,2,3].map(x=>(<div key={x} style={{width:8,height:8,borderRadius:4,background:x<d?p.color:"#2A2D35"}}/>))}</div></div>)})}</div>
      <div style={S.card}><div style={{fontSize:12,fontWeight:700,color:"#FF6B35",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Bench Press Example</div><div style={{fontSize:13,color:"#C0C4CC",lineHeight:1.8}}>{isM?<>Wk 3 → 100kg × 8<br/>Wk 6 → 100kg × 10 ✨<br/>Wk 7 → 105kg × 6-8<br/>Wk 11 → 73kg × 12 (deload)</>:<>Wk 3 → 220lbs × 8<br/>Wk 6 → 220lbs × 10 ✨<br/>Wk 7 → 231lbs × 6-8<br/>Wk 11 → 161lbs × 12 (deload)</>}</div></div>
    </div>
  );

  /* ═════════════════════ GUIDE ═════════════════════ */
  const renderGuide = () => (
    <div style={{padding:"0 20px 100px"}}>
      <SectionTitle color="#7B68EE" pre="Guide" title="Program Guide"/>
      <div style={{...S.card,marginTop:20,marginBottom:20}}>
        <div style={{fontSize:12,fontWeight:700,color:"#8A8F98",letterSpacing:1.5,textTransform:"uppercase",marginBottom:12}}>Profile</div>
        <div style={{marginBottom:10}}><label style={{fontSize:11,color:"#6B7280",fontWeight:600}}>Name</label><input value={prof.name||""} onChange={e=>update("prof",p=>({...p,name:e.target.value}))} placeholder="Your name" style={{...S.input,marginTop:4}}/></div>
        <div style={{marginBottom:10}}><label style={{fontSize:11,color:"#6B7280",fontWeight:600}}>Start Date</label><input type="date" value={prof.startDate||""} onChange={e=>update("prof",p=>({...p,startDate:e.target.value}))} style={{...S.input,marginTop:4}}/></div>
        <div><label style={{fontSize:11,color:"#6B7280",fontWeight:600}}>Notes</label><textarea value={prof.notes||""} onChange={e=>update("prof",p=>({...p,notes:e.target.value}))} placeholder="Goals..." style={{...S.input,marginTop:4,minHeight:60,resize:"vertical",fontSize:13}}/></div>
      </div>
      <div style={{background:"linear-gradient(135deg,#FF6B3510,#E8485510)",border:"1px solid #FF6B3525",borderRadius:16,padding:"20px",marginBottom:20}}>
        <div style={{fontSize:16,fontWeight:800,color:"#fff",marginBottom:10}}>The Philosophy</div><div style={{fontSize:13,color:"#C0C4CC",lineHeight:1.8}}>12 weeks of average programming executed consistently beats perfect programming attempted inconsistently.</div>
        <div style={{marginTop:14,padding:"12px 16px",background:"#12141A80",borderRadius:10,fontSize:13,fontWeight:700,color:"#E84855",textAlign:"center"}}>DON'T THINK. DON'T ANALYSE. JUST EXECUTE.</div>
      </div>
      <div style={{...S.card,marginBottom:20}}><div style={{fontSize:12,fontWeight:700,color:"#8A8F98",letterSpacing:1.5,textTransform:"uppercase",marginBottom:14}}>Key Rules</div>
        {[["📅","Show up 4 days/week"],["📋","Execute exact exercises"],["🥗","Follow nutrition formula"],["💀","Every set to FAILURE"],["🔒","Change nothing 12 weeks"]].map(([e,r],i)=>(<div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<4?"1px solid #1E2028":"none"}}><span style={{fontSize:20}}>{e}</span><span style={{fontSize:14,color:"#E0E0E0",fontWeight:600}}>{r}</span></div>))}
      </div>
      <div style={{fontSize:12,fontWeight:700,color:"#8A8F98",letterSpacing:1.5,textTransform:"uppercase",marginBottom:12}}>FAQ</div>
      {FAQS.map((f,i)=>(<div key={i} style={{background:"#1A1D23",borderRadius:14,border:openFaq===i?"1px solid #7B68EE30":"1px solid #2A2D35",marginBottom:8,overflow:"hidden"}}><button onClick={()=>setOpenFaq(openFaq===i?null:i)} style={{width:"100%",background:"none",border:"none",cursor:"pointer",padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:14,fontWeight:700,color:"#fff",textAlign:"left"}}>{f.q}</span><span style={{color:"#4A4D55",flexShrink:0,marginLeft:8}}>{openFaq===i?<Ic.Up/>:<Ic.Dn/>}</span></button>{openFaq===i&&<div style={{padding:"0 16px 14px",fontSize:13,color:"#8A8F98",lineHeight:1.7}}>{f.a}</div>}</div>))}
    </div>
  );

  /* ═════════════════════ MAIN RENDER ═════════════════════ */
  return (
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:"#12141A",fontFamily:"'DM Sans','SF Pro Display',-apple-system,sans-serif",position:"relative"}}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
      <div style={{overflowY:"auto",height:"100vh",paddingBottom:80}}>
        {tab==="home" && renderHome()}
        {tab==="workout" && (aWo && wo ? renderWorkoutDetail() : renderWorkoutList())}
        {tab==="nutrition" && renderNutrition()}
        {tab==="progress" && renderProgress()}
        {tab==="guide" && renderGuide()}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:430,background:"linear-gradient(180deg,#12141AE0,#12141A)",backdropFilter:"blur(20px)",borderTop:"1px solid #1E2028",padding:"8px 8px 12px",display:"flex",justifyContent:"space-around",zIndex:100}}>
        {navItems.map(({id,l,I})=>{const a=tab===id;return(<button key={id} onClick={()=>{setTab(id);if(id!=="workout")setAWo(null)}} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"6px 12px",borderRadius:12,minWidth:56,color:a?"#FF6B35":"#4A4D55"}}><I/><span style={{fontSize:10,fontWeight:700}}>{l}</span>{a&&<div style={{width:4,height:4,borderRadius:2,background:"#FF6B35",marginTop:-1}}/>}</button>)})}
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
